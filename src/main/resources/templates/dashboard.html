<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>이성진 대리의 AI 자산 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .card { border: none; border-radius: 15px; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .ai-card { background: linear-gradient(135.deg, #667eea 0%, #764ba2 100%); color: white; }
        .progress { height: 30px; border-radius: 15px; font-weight: bold; }
    </style>

<body>

<div class="container py-5">
    <h2 class="mb-4 fw-bold"><i class="fas fa-wallet text-primary"></i> My Wealth Dashboard</h2>

    <div class="row">
        <div class="col-12 mb-4">
            <div class="card ai-card shadow-lg">
                <div class="card-body p-4">
                    <h5 class="card-title"><i class="fas fa-robot"></i> Gemini 2.5 Pro의 실시간 진단</h5>
                    <hr class="border-light">
                    <p class="card-text fs-4 fw-light" id="aiText" th:text="${summary.aiBriefing}">AI가 분석 중입니다...</p>
                </div>
            </div>
        </div>

        <div class="col-md-7 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title mb-4">이번 달 투자 달성 현황</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span>현재 투자액: <strong th:text="${#numbers.formatInteger(summary.totalInvestment, 0, 'COMMA')} + '원'"></strong></span>
                        <span>목표: <strong>2,050,000원</strong></span>
                    </div>
                    <div class="progress mb-4">
                        <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" 
                             role="progressbar" 
                             th:style="'width: ' + ${summary.investmentProgress} + '%;'" 
                             th:text="${#numbers.formatDecimal(summary.investmentProgress, 1, 1)} + '%'">
                        </div>
                    </div>
                    <p class="text-muted small">* 목표 금액 대비 실제 자산 플랜 실행 기준입니다.</p>
                </div>
            </div>
        </div>

        <div class="col-md-5 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title mb-4">카테고리별 지출</h5>
                    <canvas id="spendingChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card ai-card shadow-lg">
    <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="card-title mb-0"><i class="fas fa-robot"></i> Gemini 2.5 Pro의 실시간 진단</h5>
            <button id="btnAnalyze" class="btn btn-light btn-sm fw-bold text-primary">
                <i class="fas fa-magic"></i> AI 분석하기
            </button>
        </div>
        <hr class="border-light">
        <p class="card-text fs-4 fw-light" id="aiText">버튼을 누르면 AI가 자산을 분석합니다.</p>
        
        <div id="aiLoader" class="spinner-border spinner-border-sm text-light d-none" role="status"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    /* Thymeleaf 데이터를 JS 객체로 변환 */
    const categoryData = [[${summary.spendingByCategory}]];
    
    const ctx = document.getElementById('spendingChart').getContext('2d');
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(categoryData),
            datasets: [{
                data: Object.values(categoryData),
                backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b'],
                hoverOffset: 4
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
    
    document.getElementById('btnAnalyze').addEventListener('click', function() {
        const aiTextField = document.getElementById('aiText');
        const loader = document.getElementById('aiLoader');
        const btn = this;

        // 로딩 상태 표시
        aiTextField.innerText = "분석 중입니다. 잠시만 기다려주세요...";
        loader.classList.remove('d-none');
        btn.disabled = true;

        // API 호출 (Fetch API 사용)
        fetch('/api/ai/analyze?memberId=1')
            .then(response => response.json())
            .then(data => {
                aiTextField.innerText = data.feedback;
                loader.classList.add('d-none');
                btn.disabled = false;
            })
            .catch(error => {
                aiTextField.innerText = "분석 중 오류가 발생했습니다.";
                loader.classList.add('d-none');
                btn.disabled = false;
                console.error('Error:', error);
            });
    });
