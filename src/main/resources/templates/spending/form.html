<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">3

<head>
    <meta charset="UTF-8">
    <title>지출 내역 등록 | AI 자산관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Pretendard', sans-serif; }
        .form-container { max-width: 550px; margin: 60px auto; }
        .card { border: none; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-save { background: #e74a3b; color: white; border: none; padding: 12px; font-weight: 600; }
        .btn-save:hover { background: #c0392b; color: white; }
        .ai-badge { background: #f8f9fc; border: 1px dashed #4e73df; color: #4e73df; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container form-container">
    <div class="d-flex align-items-center mb-4">
        <a href="/dashboard/view" class="btn btn-light rounded-circle shadow-sm me-3">
            <i class="fas fa-chevron-left"></i>
        </a>
        <h3 class="fw-bold mb-0">지출 내역 등록</h3>
    </div>

    <div class="card p-4">
        <div class="card-body">
            <form id="spendingForm">
                <div class="mb-4">
                    <label class="form-label fw-bold small"><i class="far fa-calendar-alt me-1"></i> 날짜</label>
                    <input type="date" id="spendingDate" class="form-control form-control-lg border-0 bg-light" 
                           th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small"><i class="fas fa-won-sign me-1"></i> 금액</label>
                    <input type="number" id="amount" class="form-control form-control-lg border-0 bg-light" placeholder="0">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small">
                        <i class="fas fa-pen me-1"></i> 지출 메모
                        <span class="ai-badge ms-2"><i class="fas fa-robot"></i> AI 분석 데이터</span>
                    </label>
                    <input type="text" id="memo" class="form-control form-control-lg border-0 bg-light" placeholder="예: 스타벅스 아이스 아메리카노">
                </div>

                <div class="mb-5">
				    <label class="form-label fw-bold small"><i class="fas fa-th-large me-1"></i> 카테고리</label>
			        <select id="categoryCode" class="form-select">
					    <option value="">선택하세요</option>
					    <option th:each="code : ${codeMap['SPENDING_CAT']}" th:value="${code.codeId}"   th:text="${code.codeName}">
						</option>
					</select>
				</div>

                <button type="button" onclick="submitForm()" class="btn btn-save w-100 rounded-pill shadow-sm">
                    <i class="fas fa-check me-2"></i> 저장하기
                </button>
            </form>
        </div>
    </div>
</div>
<script src="/js/common.js"></script>
<script>
function submitForm() {
    const btn = event.target.closest('button');
    const originalText = btn.innerHTML;
    
    const formData = {
        date: document.getElementById('spendingDate').value,
        amount: document.getElementById('amount').value,
        memo: document.getElementById('memo').value,
        category: document.getElementById('categoryCode').value
    };

    if (!formData.amount || !formData.memo) {
        alert("금액과 메모를 입력해 주세요!");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> AI가 분석 중...';

   	fetch('/spending/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
    })
    .then(res => res.ok ? res.text() : Promise.reject())
    .then(msg => {
        alert("성공적으로 저장되었습니다!");
        location.href = "/dashboard/view";
    })
    .catch(err => {
        alert("저장 중 오류가 발생했습니다.");
        btn.disabled = false;
        btn.innerHTML = originalText;
    });
}
</script>
</body>
</html>
